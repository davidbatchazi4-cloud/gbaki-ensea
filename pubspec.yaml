name: gbaki_ensea
description: Application d'apprentissage GBAKI ENSEA - Devoirs et cours organisés par filière avec IA intégrée
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: 6.1.5+1

  # Navigation
  go_router: ^14.6.1

  # HTTP & API
  http: 1.5.0
  dio: ^5.8.0+1

  # Local storage
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0

  # PDF viewer
  flutter_pdfview: ^1.3.2
  syncfusion_flutter_pdfviewer: ^28.2.5

  # File handling
  path_provider: ^2.1.5
  open_file: ^3.5.10
  url_launcher: ^6.3.1

  # UI components
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  lottie: ^3.3.1
  percent_indicator: ^4.2.4
  flutter_markdown: ^0.7.4+1
  google_fonts: ^6.2.1

  # Icons
  flutter_svg: ^2.0.17
  cupertino_icons: ^1.0.8

  # Gemini AI
  google_generative_ai: ^0.4.6

  # File picker
  file_picker: ^8.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
