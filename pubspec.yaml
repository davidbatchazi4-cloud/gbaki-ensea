name: gbaki_ensea
description: Application d'apprentissage GBAKI ENSEA - Devoirs et cours organisés par filière avec IA intégrée
publish_to: 'none'
version: 3.0.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  provider: 6.1.5+1
  http: 1.5.0
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0
  path_provider: ^2.1.5
  path: ^1.9.1
  file_picker: ^8.1.7
  open_file: ^3.5.10
  url_launcher: ^6.3.1
  mime: ^2.0.0
  share_plus: ^10.1.4
  firebase_core: 3.6.0
  cloud_firestore: 5.4.3
  crypto: ^3.0.3
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_markdown: ^0.7.4+1
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cupertino_icons: ^1.0.8
  percent_indicator: ^4.2.4
  google_generative_ai: ^0.4.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/data/
